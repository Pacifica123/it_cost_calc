<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Синтетический пример рабочей станции</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Рабочая станция Example Pro W8",
    "brand": "Example Pro",
    "model": "W8",
    "sku": "EX-W8",
    "offers": {
      "@type": "Offer",
      "price": 89990,
      "priceCurrency": "RUB",
      "availability": "https://schema.org/InStock"
    },
    "additionalProperty": [
      {"@type": "PropertyValue", "name": "Объем оперативной памяти", "value": "32 ГБ"},
      {"@type": "PropertyValue", "name": "Количество ядер процессора", "value": "8"},
      {"@type": "PropertyValue", "name": "Объем SSD", "value": "1 ТБ"},
      {"@type": "PropertyValue", "name": "Объем HDD", "value": "2 ТБ"},
      {"@type": "PropertyValue", "name": "Максимальная потребляемая мощность", "value": "350 Вт"}
    ]
  }
  </script>
</head>
<body><h1>Синтетический пример рабочей станции</h1></body>
</html>
